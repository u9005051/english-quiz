let questions=[],wrong=[],index=0,score=0;
let wrongCount=JSON.parse(localStorage.getItem("wrongCount")||"{}");

function shuffle(a){return a.sort(()=>0.5-Math.random());}
function start(){questions=shuffle([...bank]).slice(0,10);wrong=[];index=0;score=0;load();}

function load(){
 if(index<questions.length){
  qnum.innerText=`第 ${index+1} 題 / ${questions.length}`;
  question.innerText=questions[index].q;
  answer.value="";
 }else{
  localStorage.setItem("wrongWords",JSON.stringify(wrong));
  localStorage.setItem("wrongCount",JSON.stringify(wrongCount));
 }
}

function speakWord(){let u=new SpeechSynthesisUtterance(questions[index].a);u.lang='en-US';speechSynthesis.speak(u);} 

function submitAnswer(){
 let ans=answer.value.trim().toLowerCase();
 let c=questions[index].a;
 if(ans===c){score++;}else{wrong.push(questions[index]);wrongCount[c]=(wrongCount[c]||0)+1;}
 index++;load();
}

function reviewWrong(){let s=localStorage.getItem("wrongWords");if(s){questions=JSON.parse(s);index=0;wrong=[];load();}}

function showRanking(){
 let sorted=Object.entries(wrongCount).sort((a,b)=>b[1]-a[1]);
 let html="<h3>🔥 錯最多排行榜</h3>";
 sorted.slice(0,10).forEach((i,x)=>html+=`<div>${x+1}. ${i[0]}（${i[1]}次）</div>`);
 ranking.innerHTML=html;
}
