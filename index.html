<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語單字測驗（語音版）</title>
<style>
body {font-family: Arial; padding:15px; margin:0; background:#f5f5f5;}
h2 {text-align:center;}
.card {background:white; padding:20px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); text-align:center;}
.question {font-size:22px; margin-bottom:15px;}
input {width:100%; padding:12px; font-size:18px; border-radius:8px; border:1px solid #ccc;}
button {width:100%; padding:14px; font-size:18px; margin-top:10px; border:none; border-radius:10px;}
.next {background:#4CAF50; color:white;}
.speak {background:#2196F3; color:white;}
#result {text-align:center; font-size:20px; margin-top:20px;}
</style>
</head>
<body>

<h2>🔊 英語單字聽寫測驗</h2>
<div class="card">
  <div id="qnum"></div>
  <div id="question" class="question"></div>
  <button class="speak" onclick="speakWord()">🔊 播放單字</button>
  <input id="answer" placeholder="請輸入英文">
  <button class="next" onclick="submitAnswer()">下一題</button>
</div>
<p id="result"></p>

<script>
const bank = [
{q:"如同",a:"as"},{q:"所以",a:"so"},{q:"之前",a:"ago"},{q:"工作",a:"job"},{q:"鑰匙",a:"key"},
{q:"讓",a:"let"},{q:"但是",a:"yet"},{q:"如果",a:"if"},{q:"健身房",a:"gym"},{q:"果醬",a:"jam"},
{q:"低",a:"low"},{q:"五月",a:"may"},{q:"用",a:"use"},{q:"露營",a:"camp"},{q:"銀行",a:"bank"},
{q:"洞穴",a:"cave"},{q:"皮帶",a:"belt"},{q:"聊天",a:"chat"},{q:"黑暗",a:"dark"},{q:"社團",a:"club"}
];

let questions = shuffle([...bank]).slice(0,10);
let wrong = [];
let index = 0;
let score = 0;

function shuffle(arr){return arr.sort(()=>0.5-Math.random());}

function load(){
  if(index < questions.length){
    document.getElementById("qnum").innerText = `第 ${index+1} 題 / ${questions.length}`;
    document.getElementById("question").innerText = questions[index].q;
    document.getElementById("answer").value = "";
  } else {
    if(wrong.length > 0){
      alert("進入錯題重練！");
      questions = wrong;
      wrong = [];
      index = 0;
      load();
    } else {
      document.getElementById("question").innerText = "完成！";
      document.getElementById("qnum").innerText = "";
      document.getElementById("result").innerText = `🎉 總分：${score}`;
    }
  }
}

function speakWord(){
  let utterance = new SpeechSynthesisUtterance(questions[index].a);
  utterance.lang = 'en-US';
  speechSynthesis.speak(utterance);
}

function submitAnswer(){
  let ans = document.getElementById("answer").value.trim().toLowerCase();
  if(ans === questions[index].a){
    score++;
  } else {
    wrong.push(questions[index]);
  }
  index++;
  load();
}

load();
</script>

</body>
</html>
