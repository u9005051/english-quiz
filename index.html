button {width:100%; padding:14px; font-size:18px; margin-top:10px; border:none; border-radius:10px;}
.next {background:#4CAF50; color:white;}

{q:"摩天大樓",a:"skyscraper"},{q:"大學",a:"university"},{q:"比賽",a:"competition"}
];

let questions = shuffle([...bank]).slice(0,10);
let wrong = [];
let index = 0;
let score = 0;

function shuffle(arr){return arr.sort(()=>0.5-Math.random());}

function load(){
  if(index < questions.length){
    document.getElementById("qnum").innerText = `第 ${index+1} 題 / ${questions.length}`;
    document.getElementById("question").innerText = questions[index].q;
    document.getElementById("answer").value = "";
  } else {
    if(wrong.length > 0){
      alert("進入錯題重練！");
      questions = wrong;
      wrong = [];
      index = 0;
      load();
    } else {
      document.getElementById("question").innerText = "完成！";
      document.getElementById("qnum").innerText = "";
      document.getElementById("result").innerText = `🎉 總分：${score}`;
    }
  }
}

function speakWord(){
  let utterance = new SpeechSynthesisUtterance(questions[index].a);
  utterance.lang = 'en-US';
  speechSynthesis.speak(utterance);
}

function submitAnswer(){
  let ans = document.getElementById("answer").value.trim().toLowerCase();
  if(ans === questions[index].a){
    score++;
  } else {
    wrong.push(questions[index]);
  }
  index++;
  load();
}

load();
</script>
