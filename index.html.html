<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語單字王（最終優化版）</title>

<style>
body {font-family: Arial; padding:15px; margin:0; background:#f5f5f5;}
h2 {text-align:center;}
.card {background:white; padding:20px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); text-align:center;}
.question {font-size:26px; margin-bottom:15px;}
input {width:100%; padding:12px; font-size:18px; border-radius:8px;}
button {width:100%; padding:14px; font-size:18px; margin-top:10px; border:none; border-radius:10px;}
.next {background:#4CAF50; color:white;}
.speak {background:#2196F3; color:white;}
.review {background:#FF9800; color:white;}
.rank {background:#9C27B0; color:white;}
#ranking {margin-top:20px; background:white; padding:15px; border-radius:10px;}
</style>
</head>

<body>

<h2>📱 英語單字王（最終優化版）</h2>

<div class="card">
  <div id="qnum"></div>
  <div id="question" class="question"></div>

  <button class="speak" onclick="speakWord()">🔊 發音</button>

  <input id="answer" placeholder="請輸入英文">

  <button class="next" onclick="submitAnswer()">下一題</button>
  <button class="review" onclick="reviewWrong()">📚 錯題複習</button>
  <button class="rank" onclick="showRanking()">🏆 排行榜</button>
</div>

<div id="ranking"></div>

<script>

// 🔥 完整題庫（優化結構）
const bank = `as so ago job key let yet if gym jam low may use camp bank cave belt chat dark club date fall deep full each gate east gold hate half hear hard hill hour hole join hope july june keep just kind king lift knee math land meal left mind next past once path oven poor over quiz race soon salt stay save team spot tent tour wife view wild warm will west wish wood april zero agree after break alone begin cheap earth chess elbow crown empty early enter foggy heavy glove hotel group hurry guess knife large metal later month leave noisy light north lucky ocean march pilot prize spend piece south quite sound right space ready speak score smell still snack swing shelf across taste twice arrive until visit august autumn anyone while x-ray appear before during bridge engine borrow enough broken finish corner fridge decide follow design finger desert forget future online get to planet insect pocket letter pepper lovely puzzle minute repair member repeat museum rocket screen violin secret waiter should winner silver winter spring airport singer already search amazing summer believe biscuit century bandage collect bicycle explain channel explore cartoon factory chemist festival concert history costume husband improve meeting instead office january perhaps journey prepare married popular missing pyramid manager railway million stadium strange actually special anywhere theater through business traffic bracelet uniform calendar usually creature worried december enormous platform envelope remember february suddenly friendly surprise mountain thousand medicine tomorrow necklace together november adventure astronaut magazine ambulance newspaper butterfly passenger delicious september excellent somewhere expensive timetable geography wonderful important chopsticks disappear environment dictionary frightening everywhere information journalist interesting restaurant invitation skyscraper conversation university of course competition`.split(" ");

let questions=[],wrong=[],index=0,score=0;
let wrongCount=JSON.parse(localStorage.getItem("wrongCount")||"{}");

function shuffle(arr){return arr.sort(()=>0.5-Math.random());}

function start(){
  questions = shuffle([...bank]).slice(0,10);
  index=0; score=0; wrong=[];
  load();
}

function load(){
  if(index < questions.length){
    document.getElementById("qnum").innerText =
      `第 ${index+1} 題 / ${questions.length}`;
    document.getElementById("question").innerText =
      questions[index];
    document.getElementById("answer").value="";
  }else{
    localStorage.setItem("wrongWords",JSON.stringify(wrong));
    localStorage.setItem("wrongCount",JSON.stringify(wrongCount));
    document.getElementById("question").innerText="🎉 完成！";
  }
}

function speakWord(){
  let u=new SpeechSynthesisUtterance(questions[index]);
  u.lang='en-US';
  speechSynthesis.speak(u);
}

function submitAnswer(){
  let ans=document.getElementById("answer").value.trim().toLowerCase();
  let correct=questions[index];

  if(ans===correct){
    score++;
  }else{
    wrong.push(correct);
    wrongCount[correct]=(wrongCount[correct]||0)+1;
  }

  index++;
  load();
}

function reviewWrong(){
  let s=localStorage.getItem("wrongWords");
  if(s){
    questions=JSON.parse(s);
    if(questions.length===0){alert("沒有錯題");return;}
    index=0;
    wrong=[];
    load();
  }
}

function showRanking(){
  let sorted=Object.entries(wrongCount)
    .sort((a,b)=>b[1]-a[1]);
  let html="<h3>🔥 錯最多排行榜</h3>";
  sorted.slice(0,10).forEach((i,x)=>{
    html+=`<div>${x+1}. ${i[0]}（${i[1]}次）</div>`;
  });
  document.getElementById("ranking").innerHTML=html;
}

window.onload=start;

</script>

</body>
</html>
